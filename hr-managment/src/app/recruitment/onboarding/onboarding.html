<div class="admin-layout" dir="rtl">
  <header class="glass-header">
    <div class="title-section">
      <h1>مرحلة الانضمام</h1>
      <p>إدارة المرشحين المقبولين وإتمام إجراءات التعيين</p>
    </div>
  </header>

  <div class="stages-vertical-list">
    <div class="stage-section">
      <div class="stage-card-header">
        <div class="stage-info">
          <h3>المرشحون المقبولون</h3>
          <span class="count-pill">{{ hiredCandidates.length }} مرشح</span>
        </div>
      </div>

      <div class="candidates-scroll-area">
        <div class="candidate-card" *ngFor="let candidate of hiredCandidates">
          <div class="card-top">
            <img [src]="candidate.profile_image_url ? 'http://localhost:3000/uploads/' + candidate.profile_image_url : 'assets/unknown.png'" 
                 (error)="handleImageError($event)">
            <div class="candidate-meta">
              <h4>{{ candidate.full_name }}</h4>
              <span class="job-tag">{{ candidate.display_job }}</span>
            </div>
          </div>

          <div class="card-bottom">
            <div class="info-row">
              <i class="fas fa-envelope"></i>
              <span>{{ candidate.email }}</span>
            </div>
            
            <div class="status-action-group">
              <label class="status-label">حالة العقد</label>
              <select class="stage-select" 
                      [(ngModel)]="candidate.contract_status" 
                      (change)="onStatusChange(candidate, candidate.contract_status)">
                <option *ngFor="let status of contractStatuses" [value]="status.value">
                  {{ status.label }}
                </option>
              </select>
            </div>
          </div>
        </div>

        <div class="empty-state-mini" *ngIf="hiredCandidates.length === 0">
          <p>لا يوجد مرشحين في مرحلة الانضمام حالياً.</p>
        </div>
      </div>
    </div>
  </div>
</div>
