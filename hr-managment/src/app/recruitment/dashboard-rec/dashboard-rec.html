<div class="dashboard-container" dir="rtl">
  <div class="stats-grid">
    <div class="stat-item white-theme">
      <div class="icon-box-white"><i class="fas fa-briefcase"></i></div>
      <div class="stat-info">
        <span class="label-white">إجمالي الوظائف</span>
        <h2 class="value-white">{{ totalVacancies }}</h2>
      </div>
    </div>
    <div class="stat-item white-theme">
      <div class="icon-box-white"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <span class="label-white">المتقدمين</span>
        <h2 class="value-white">{{ advancedCandidates }}</h2>
      </div>
    </div>
    <div class="stat-item white-theme">
      <div class="icon-box-white"><i class="fas fa-chart-pie"></i></div>
      <div class="stat-info">
        <span class="label-white">معدل قبول العرض</span>
        <h2 class="value-white">{{ oarRate }}%</h2>
      </div>
    </div>
  </div>

  <div class="dashboard-main-grid">
    <div class="card-panel-white">
      <div class="panel-header-white">
        <h3>توزيع المرشحين</h3>
      </div>
      <div class="panel-body">
        <div class="list-item-white" *ngFor="let skill of jobSkillsStats">
          <div class="item-content">
            <div class="mini-avatar-white">{{ skill.title[0] }}</div>
            <p class="item-name-white">{{ skill.title }}</p>
          </div>
          <span class="badge-purple-white">{{ skill.count }}</span>
        </div>
      </div>
    </div>

    <div class="card-panel-white">
      <div class="panel-header-white">
        <h3>حالة العرض</h3>
      </div>
      <div class="panel-body centered">
        <div class="chart-wrapper">
          <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="'pie'"></canvas>
        </div>
      </div>
    </div>

    <div class="card-panel-white full-width-mobile">
      <div class="panel-header-white">
        <h3>أحدث المرشحين</h3>
      </div>
      <div class="panel-body">
        <div class="candidate-item-white" *ngFor="let can of recentCandidates">
          <div class="item-content">
            <img [src]="can.profile_image" (error)="handleImageError($event)" class="round-img-white">
            <div class="details">
              <p class="name-white">{{ can.full_name }}</p>
              <p class="sub-white">{{ can.display_title }}</p>
            </div>
          </div>
          <span class="id-label-white">#{{ can.id }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
