<div class="candidates-container" dir="rtl">
  <div class="header-modern">
    <div class="title-group">
      <h1>إدارة المرشحين</h1>
      <p>متابعة طلبات التوظيف لشركة Solid Soft</p>
    </div>

    <div class="controls-group">
      <button class="btn-add" (click)="openAddModal()">
        <i class="fas fa-plus"></i> مرشح جديد
      </button>

      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input 
          type="text" 
          [(ngModel)]="searchText" 
          placeholder="بحث عن مرشح..." 
          class="premium-input">
      </div>
    </div>
  </div>

  <div class="candidates-grid">
    <div class="candidate-card" *ngFor="let c of filteredCandidates">
      <div class="card-header">
        <div class="avatar-wrapper">
          <img 
            [src]="c.profile_image_url ? 'http://localhost:3000/uploads/' + c.profile_image_url : 'assets/unknown.png'" 
            class="circular-img" 
            (error)="handleImageError($event)">
        </div>

        <div class="menu-container">
          <button class="dots-btn" (click)="toggleMenu($event, c)">⋮</button>
          <div class="dropdown-panel shadow-lg" *ngIf="c.showMenu">
            <button class="menu-item" (click)="viewCandidate(c)"><i class="fas fa-eye"></i> عرض التفاصيل</button>
            <button class="menu-item" (click)="editCandidate(c)"><i class="fas fa-edit"></i> تعديل البيانات</button>
            <div class="menu-divider"></div>
            <button class="menu-item delete" (click)="confirmDelete(c.id)"><i class="fas fa-trash"></i> حذف المرشح</button>
          </div>
        </div>
      </div>

      <div class="card-body">
        <h3 class="candidate-name">{{c.full_name}}</h3>
        <div class="info-list">
          <div class="info-item"><i class="fas fa-envelope"></i> {{c.email}}</div>
          <div class="info-item"><i class="fas fa-calendar-alt"></i> العمر: {{ c.age }} سنة</div>
        </div>
        <div class="job-tag-wrapper">
          <span class="job-tag">{{ getDisplayJobTitle(c) }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" *ngIf="showAddModal">
    <div class="modal-container shadow-2xl">
      <div class="modal-header-modern">
        <h2>{{ isViewMode ? 'تفاصيل المرشح' : (candidateForm.get('id')?.value ? 'تعديل بيانات المرشح' : 'إضافة مرشح جديد') }}</h2>
      </div>

      <div class="modal-body-scroll">
        <div class="center-avatar-section">
          <div class="avatar-upload-wrapper">
            <div class="image-frame-circle shadow-md">
              <img 
                [src]="previewUrl ? previewUrl : (candidateForm.get('profile_image_url')?.value ? 'http://localhost:3000/uploads/' + candidateForm.get('profile_image_url')?.value : 'assets/unknown.png')" 
                class="preview-img-circle" 
                (error)="handleImageError($event)">
              <label *ngIf="!isViewMode" class="camera-overlay-btn" title="تغيير الصورة">
                <i class="fas fa-camera"></i>
                <input type="file" (change)="onPhotoSelect($event)" hidden accept="image/*">
              </label>
            </div>
            <button type="button" class="text-btn-remove" *ngIf="!isViewMode && (previewUrl || candidateForm.get('profile_image_url')?.value)" (click)="removeImage()">
              <i class="fas fa-trash-alt"></i> حذف الصورة
            </button>
          </div>
        </div>

        <form [formGroup]="candidateForm" class="modern-form">
          <div class="form-grid">
            <div class="field full">
              <label>الاسم الرباعي الكامل</label>
              <div class="input-with-icon">
                <i class="fas fa-user"></i>
                <input type="text" formControlName="full_name" [class.input-error]="isInvalid(candidateForm, 'full_name')">
              </div>
            </div>

            <div class="field">
              <label>البريد الإلكتروني</label>
              <div class="input-with-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" formControlName="email" [class.input-error]="isInvalid(candidateForm, 'email')">
              </div>
            </div>

            <div class="field">
              <label>رقم الهاتف</label>
              <div class="input-with-icon">
                <i class="fas fa-phone"></i>
                <input type="text" formControlName="phone" [class.input-error]="isInvalid(candidateForm, 'phone')" placeholder="07XXXXXXXX">
              </div>
            </div>

           <div class="field">
  <label>تاريخ الميلاد</label>
  <div class="input-with-icon">
    <i class="fas fa-birthday-cake"></i>
    <input type="date" formControlName="birth_date" [class.input-error]="isInvalid(candidateForm, 'birth_date')">
  </div>
</div>

<div class="field">
  <label>العمر</label>
  <div class="input-with-icon">
    <i class="fas fa-hourglass-half"></i>
    <input type="number" formControlName="age" placeholder="اكتب العمر" [class.input-error]="isInvalid(candidateForm, 'age')">
  </div>
</div>

            <div class="field">
              <label>مكان السكن</label>
              <div class="input-with-icon">
                <i class="fas fa-map-marker-alt"></i>
                <select formControlName="address" [class.input-error]="isInvalid(candidateForm, 'address')">
                  <option value="">اختر المحافظة</option>
                  <option *ngFor="let g of jordanGovernorates" [value]="g">{{g}}</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>التخصص الجامعي</label>
              <div class="input-with-icon">
                <i class="fas fa-graduation-cap"></i>
                <input type="text" formControlName="university_major" [class.input-error]="isInvalid(candidateForm, 'university_major')">
              </div>
            </div>

            <div class="field">
              <label>سنة التخرج</label>
              <div class="input-with-icon">
                <i class="fas fa-calendar"></i>
                <input type="number" formControlName="graduation_year" [class.input-error]="isInvalid(candidateForm, 'graduation_year')">
              </div>
            </div>

            <div class="field full">
              <label>المسمى الوظيفي المطلوب</label>
              <div class="input-with-icon">
                <i class="fas fa-briefcase"></i>
                <select formControlName="job_id" (change)="onJobSelect($event)" [class.input-error]="isInvalid(candidateForm, 'job_id')">
                  <option [value]="null">اختر الوظيفة</option>
                  <option *ngFor="let j of jobs" [value]="j.id">{{j.job_title}}</option>
                  <option value="other">أخرى (مسمى مخصص)</option>
                </select>
              </div>
              <div *ngIf="isCustomJob" class="fade-in mt-2">
                <input type="text" formControlName="custom_job" placeholder="اكتب المسمى الوظيفي هنا يدوياً" class="premium-input w-full">
              </div>
            </div>

            <div class="field full">
              <div class="experience-box" [class.active]="candidateForm.get('has_experience')?.value">
                <label class="custom-check">
                  <input type="checkbox" formControlName="has_experience">
                  <span>هل يوجد خبرة سابقة في هذا المجال؟</span>
                </label>
                <div *ngIf="candidateForm.get('has_experience')?.value" class="form-grid mt-4 fade-in">
                  <div class="field"><label>المسمى الوظيفي السابق</label><input type="text" formControlName="exp_position" class="premium-input"></div>
                  <div class="field"><label>اسم الشركة</label><input type="text" formControlName="exp_company_name" class="premium-input"></div>
                  <div class="field full"><label>مدة الخبرة</label><input type="text" formControlName="exp_period" placeholder="مثال: سنتين" class="premium-input"></div>
                </div>
              </div>
            </div>

            <div class="field full">
              <label>السيرة الذاتية (PDF)</label>
              <div *ngIf="!isViewMode" class="input-with-icon">
                <i class="fas fa-file-pdf"></i>
                <input type="file" (change)="onFileSelect($event)" accept=".pdf">
              </div>
              <div *ngIf="candidateForm.get('cv_url')?.value" class="cv-display-box mt-2">
                <button type="button" class="btn-view-cv" (click)="openCv()">
                  <i class="fas fa-file-pdf"></i> عرض السيرة الذاتية المرفقة
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer-modern">
        <button class="btn-cancel" (click)="closeModal()">إلغاء</button>
        <button class="btn-save shadow-md" (click)="submitCandidate()" *ngIf="!isViewMode">
          <i class="fas fa-check"></i> حفظ البيانات
        </button>
      </div>
    </div>
  </div>
</div>
