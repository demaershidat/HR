<div class="page-container">
  <div class="splash-container" [class.fade-out-bg]="!isSplashing">
    <img src="assets/solidSoft.png" class="zoom-logo" alt="Solid Soft">
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="card-header">
        <h2>Welcome To</h2>
        <h1 class="brand-name">SOLID SOFT</h1>
        <p class="subtitle">HR Management System</p>
      </div>

      <div *ngIf="errorMessage" class="error-box shake-animation">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="input-field">
          <label>البريد الإلكتروني</label>
          <div class="input-wrapper" [class.error-border]="emailInvalid">
            <input type="email" placeholder="example@domain.com" formControlName="email">
          </div>
          <span class="hint-text" *ngIf="emailInvalid">يرجى إدخال بريد إلكتروني صحيح</span>
        </div>

        <div class="input-field">
          <label>كلمة المرور</label>
          <div class="input-wrapper" [class.error-border]="passwordInvalid">
            <input type="password" placeholder="••••••••" formControlName="password">
          </div>
          <span class="hint-text" *ngIf="passwordInvalid">كلمة المرور مطلوبة</span>
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="submit-btn">
          <span>تسجيل الدخول</span>
        </button>
      </form>
    </div>
  </div>
</div>
