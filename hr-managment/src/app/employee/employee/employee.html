<div class="admin-layout" dir="rtl">
  <header class="glass-header">
    <div class="title-section">
      <h1>سجل الموظفين</h1>
      <p>قائمة الموظفين الذين انضموا رسمياً لعائلة Solid Soft</p>
    </div>
  </header>

  <div class="employee-table-container card-panel-white">
    <table class="premium-table" *ngIf="!loading && employees.length > 0">
      <thead>
        <tr>
          <th>الموظف</th>
          <th>المسمى الوظيفي</th>
          <th>تاريخ الانضمام</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let emp of employees">
          <td>
            <div class="user-cell">
              <img [src]="emp.profile_image_url ? 'http://localhost:3000/uploads/' + emp.profile_image_url : 'assets/unknown.png'" 
                   (error)="$any($event.target).src = 'assets/unknown.png'" class="table-avatar">
              <span>{{ emp.full_name }}</span>
            </div>
          </td>
          <td>{{ emp.display_job }}</td>
          <td>{{ emp.updated_at | date:'yyyy-MM-dd' }}</td>
          <td><span class="status-badge status-joined">على رأس العمل</span></td>
        </tr>
      </tbody>
    </table>
    
    <div class="empty-state" *ngIf="!loading && employees.length === 0">
      <p>لا يوجد موظفين حالياً في النظام.</p>
    </div>
  </div>
</div>
